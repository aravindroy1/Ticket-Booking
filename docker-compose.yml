version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: ticket_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ticket_network
    restart: unless-stopped

  # 2. FastAPI Backend
  backend:
    build:
      context: ./backend
    container_name: ticket_backend
    environment:
      - MONGO_URL=mongodb://mongodb:27017
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - ticket_network
    restart: unless-stopped

  # 3. Next.js Frontend
  frontend:
    build:
      context: ./frontend
    container_name: ticket_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ticket_network
    restart: unless-stopped

  # 4. NGINX API Gateway (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: ticket_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ticket_network
    restart: unless-stopped

networks:
  ticket_network:
    driver: bridge

volumes:
  mongodb_data:
